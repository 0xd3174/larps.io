<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seekers vs Hiders</title>
  </head>
  <body>
    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Main Menu Overlay -->
    <div id="mainMenu" class="overlay">
      <div class="menu-container">
        <h1 class="logo-title">Seekers vs Hiders</h1>
        
        <div class="form-container">
          <div class="main-action">
            <button id="btnCreate" class="btn primary-btn">Create Room</button>
            <button id="btnMyRoom" class="btn primary-btn">My Room</button>
          </div>
          
          <div class="login-box">
            <input type="text" id="nickname" placeholder="Nickname" />
            <input type="text" id="roomId" placeholder="Room ID (optional)" />
            <button id="btnJoin" class="btn action-btn">Join Room</button>
            <p id="menuError" class="error-msg"></p>
          </div>
        </div>
        
        <div class="panels-container">
          <div class="info-panel">
            <h3>Changelog</h3>
            <ul>
              <li>Initial release</li>
              <li>Minimalistic UI update</li>
            </ul>
          </div>
          <div class="info-panel">
            <h3>How to Play</h3>
            <p>WASD to move.<br>Seekers touch hiders.<br>Hiders survive.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- In-Game UI -->
    <div id="inGameUI" class="overlay hidden">
      <div class="top-bar">
        <div id="gameState">Lobby</div>
        <div style="font-size: 0.4em; color: #555; text-align: center;" id="playerRole">Role: ---</div>
        <div style="font-size: 0.4em; color: #555; text-align: center;" id="roomInfo">Room: ---</div>
      </div>

      <div id="chatBox" class="chat-container">
        <div id="chatMessages" class="chat-messages"></div>
        <input type="text" id="chatInput" placeholder="Press enter to chat" />
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
